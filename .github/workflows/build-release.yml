name: NextGen IDA CI/CD Core Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] # v1.0.0 gibi bir tag pushlandığında otomatik Release tetikler
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test Core on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Bir platform hata alsa bile diğer platformların derlenmesini durdurmaz
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: nextgen-ida.exe
            asset_name: nextgen-ida-windows.exe
          - os: ubuntu-latest
            artifact_name: nextgen-ida
            asset_name: nextgen-ida-linux
          - os: macos-latest
            artifact_name: nextgen-ida
            asset_name: nextgen-ida-macos

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Setup Highly Optimized Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cargo Cache Setup (Derlemeleri Maksimum Hıza Ulaştırır)
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ matrix.os }}-cargo-

    - name: Run Disassembler & Signature Engine Tests (Zydis v4 Testi)
      run: cargo test --verbose

    - name: Compile High-Performance Release Binary (Optimize Derleme)
      run: cargo build --release

    - name: Stash Artifact for Deployment (Dosyaları Paketle)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: target/release/${{ matrix.artifact_name }}

  release:
    name: Production Release Deployment
    needs: build
    if: startsWith(github.ref, 'refs/tags/') # Sadece tag atıldığında çalışır
    runs-on: ubuntu-latest
    steps:
    - name: Download Multi-Platform Binaries
      uses: actions/download-artifact@v4

    - name: Generate Automated GitHub Release Notes & Upload Binaries
      uses: softprops/action-gh-release@v2
      with:
        files: |
          nextgen-ida-windows.exe/nextgen-ida.exe
          nextgen-ida-linux/nextgen-ida
          nextgen-ida-macos/nextgen-ida
        body: |
          # NextGen IDA Core Engine Production Release
          
          ## Deployed Capabilities:
          - **Ultra-Fast x86/x64 Disassembly Engine**: Fully powered by Zydis v4.x Engine.
          - **Multi-Segment Signature Scanner**: Advanced pattern hunter with wildcard (`?`) functionality.
          - **Cross-Platform Compilation**: Native builds generated for Windows (.exe), Linux, and macOS.
          
          *Compiled, thoroughly tested, and verified through automated GitHub Actions pipelines.*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
